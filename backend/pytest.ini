[pytest]
# Pytest configuration for Mentra backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short
    --color=yes
    -ra

# Coverage options (when running with --cov)
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Markers for organizing tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow
    llm: marks LLM service tests
    spaced_repetition: marks spaced repetition tests
    analytics: marks session analytics tests
    endpoints: marks API endpoint tests

# Asyncio configuration
asyncio_mode = auto

# Minimum Python version
minversion = 7.0
